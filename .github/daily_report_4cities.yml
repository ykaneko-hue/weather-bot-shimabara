name: Daily 4 Cities Weather Report

on:
  schedule:
    # 日本時間 11:30 (UTC 02:30) に実行
    - cron: '30 2 * * *'
  workflow_dispatch: # 手動実行ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install selenium requests

      - name: Run script
        # ここで実行するファイル名を 4city_weather_bot.py に指定します
        run: python 4city_weather_bot.py
